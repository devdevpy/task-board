<div class="dashboard-page">
  <header class="page-head mb-4">
    <div>
      <h2 class="mb-1">Dashboard</h2>
      <p class="text-muted-2 mb-0">Your projects at a glance</p>
    </div>
    <a href="/projects" data-link class="btn btn-ghost btn-sm px-3 py-2">
      <i data-lucide="folder"></i> Projects
    </a>
  </header>

  <div class="row g-3 mb-4">
    <div class="col-md-3 col-sm-6">
      <div class="glass stat-card p-4">
        <span class="stat-icon text-accent"><i data-lucide="folder"></i></span>
        <div class="stat-value" id="stat-projects">0</div>
        <div class="stat-label text-muted-2">Projects</div>
      </div>
    </div>
    <div class="col-md-3 col-sm-6">
      <div class="glass stat-card p-4">
        <span class="stat-icon text-info"><i data-lucide="list-checks"></i></span>
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label text-muted-2">Total tasks</div>
      </div>
    </div>
    <div class="col-md-3 col-sm-6">
      <div class="glass stat-card p-4">
        <span class="stat-icon text-warning"><i data-lucide="loader-circle"></i></span>
        <div class="stat-value" id="stat-open">0</div>
        <div class="stat-label text-muted-2">Open tasks</div>
      </div>
    </div>
    <div class="col-md-3 col-sm-6">
      <div class="glass stat-card p-4">
        <span class="stat-icon text-success"><i data-lucide="check-circle"></i></span>
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label text-muted-2">Done tasks</div>
      </div>
    </div>
  </div>

  <div class="glass p-4" id="dashboard-projects">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <h5 class="mb-0">Projects</h5>
      <a href="/projects" data-link class="btn btn-ghost btn-sm px-3 py-2">
        View all <i data-lucide="arrow-right"></i>
      </a>
    </div>
    <div class="list-group list-group-flush" id="dashboard-project-list">
      <div class="text-muted-2 small">Loading projects...</div>
    </div>
  </div>
</div>
