<div class="project-tasks-page">
  <nav aria-label="breadcrumb" class="mb-2">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/projects" data-link>Projects</a></li>
      <li class="breadcrumb-item active" id="project-breadcrumb-name" aria-current="page">Project</li>
    </ol>
  </nav>

  <header class="project-info mb-4">
    <div class="d-flex align-items-start gap-3">
      <span class="project-icon-large"><i data-lucide="folder-kanban"></i></span>
      <div class="flex-grow-1">
        <h2 class="mb-1" id="project-tasks-title">Tasks board</h2>
        <p class="text-muted-2 mb-0" id="project-tasks-description">Project description</p>
      </div>
    </div>
    <a href="/projects" data-link class="btn btn-ghost btn-sm px-3 py-2 back-link">
      <i data-lucide="arrow-left"></i> Back to projects
    </a>
  </header>

  <div class="board-wrapper" id="board-wrapper">
    <div class="board" id="task-board">
      <div class="col-12 text-center text-muted-2 py-5">Loading tasks...</div>
    </div>
  </div>
</div>
