<div class="projects-page">
  <header class="page-head mb-4">
    <div class="d-flex align-items-center gap-3">
      <a href="/dashboard" data-link class="btn btn-ghost btn-sm px-3 py-2">
        <i data-lucide="arrow-left"></i> Back
      </a>
      <div>
        <h2 class="mb-1">Projects</h2>
        <p class="text-muted-2 mb-0">Manage your projects</p>
      </div>
    </div>
    <a href="/project/add" data-link class="btn btn-glow btn-sm px-3 py-2">
      <i data-lucide="plus"></i> New project
    </a>
  </header>

  <div class="glass table-responsive" id="projects-table-wrapper">
    <table class="table table-dark table-hover projects-table mb-0">
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th class="text-center">Stages</th>
          <th class="text-center">Open Tasks</th>
          <th class="text-center">Done Tasks</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody id="projects-table-body">
        <tr>
          <td colspan="6" class="text-center text-muted-2 py-4">Loading projects...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="delete-project-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Delete project</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <p class="mb-0">Are you sure you want to delete <strong id="delete-project-name"></strong>?</p>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-ghost btn-sm px-3 py-2" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger btn-sm px-3 py-2" id="confirm-delete-project">Delete</button>
      </div>
    </div>
  </div>
</div>
