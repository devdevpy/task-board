<div class="login-page d-flex justify-content-center align-items-center py-5">
  <div class="glass login-card p-4 p-md-5">
    <div class="text-center mb-4">
      <span class="login-mark"><i data-lucide="lock-keyhole"></i></span>
      <h2 class="mt-3 mb-1" id="auth-title">Welcome back</h2>
      <p class="text-muted-2 mb-0" id="auth-subtitle">Sign in to manage your projects</p>
    </div>

    <div id="auth-alert" class="alert d-none mb-3" role="alert"></div>

    <form id="auth-form">
      <div class="mb-3">
        <label for="email" class="form-label text-muted-2">Email address</label>
        <input
          type="email"
          class="form-control form-control-lg"
          id="email"
          placeholder="you@example.com"
          required
        />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label text-muted-2">Password</label>
        <input
          type="password"
          class="form-control form-control-lg"
          id="password"
          placeholder="••••••••"
          minlength="6"
          required
        />
        <div class="form-text text-muted-2 small mt-1" id="password-hint">At least 6 characters.</div>
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-glow btn-lg" id="auth-submit">
          <i data-lucide="log-in"></i> Login
        </button>
      </div>
    </form>

    <p class="text-center text-muted-2 mb-0">
      <span id="auth-switch-text">Don't have an account?</span>
      <button type="button" class="btn btn-link text-decoration-none p-0 ms-1" id="auth-toggle">
        Create one
      </button>
    </p>
  </div>
</div>
