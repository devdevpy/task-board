<div class="login-page d-flex justify-content-center align-items-center py-5">
  <div class="glass login-card p-4 p-md-5">
    <div class="text-center mb-4">
      <span class="login-mark"><i data-lucide="lock-keyhole"></i></span>
      <h2 class="mt-3 mb-1">Welcome back</h2>
      <p class="text-muted-2 mb-0">Sign in to manage your projects</p>
    </div>
    <form id="login-form">
      <div class="mb-3">
        <label for="email" class="form-label text-muted-2">Email address</label>
        <input
          type="email"
          class="form-control form-control-lg"
          id="email"
          placeholder="you@example.com"
          required
        />
      </div>
      <div class="mb-4">
        <label for="password" class="form-label text-muted-2">Password</label>
        <input
          type="password"
          class="form-control form-control-lg"
          id="password"
          placeholder="••••••••"
          required
        />
      </div>
      <div class="d-grid">
        <button type="submit" class="btn btn-glow btn-lg">
          <i data-lucide="log-in"></i> Login
        </button>
      </div>
    </form>
  </div>
</div>
